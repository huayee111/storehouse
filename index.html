<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司內部倉儲網格系統 - 進階版</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --grid-cols: 30;
            --grid-rows: 30;
            --cell-size: 40px; /* 預設 1m = 40px */
        }
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; display: flex; gap: 20px; }
        #control-panel { width: 320px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; }
        .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, button { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        
        /* 切換鈕樣式 */
        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .switch-container input { width: auto; margin: 0; }

        .color-history { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
        .color-dot { width: 25px; height: 25px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; }

        #main-area { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; }
        #warehouse-container { border: 2px solid #333; background-color: #e2e8f0; overflow: auto; position: relative; width: 100%; height: 550px; }
        #warehouse-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), var(--cell-size));
            grid-template-rows: repeat(var(--grid-rows), var(--cell-size));
            background-image: 
                linear-gradient(to right, #ccc 1px, transparent 1px),
                linear-gradient(to bottom, #ccc 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
            position: absolute;
            top: 0; left: 0;
        }
        
        #cargo-buffer { min-height: 100px; background: #fff; border: 2px dashed #999; border-radius: 8px; padding: 10px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }

        /* 貨物物件 */
        .cargo-item {
            position: absolute; /* 讓其能自由定位 */
            box-sizing: border-box;
            border: 2px solid rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            cursor: move;
            touch-action: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
            user-select: none;
            z-index: 10;
        }
        /* 在緩衝區時的預設狀態 */
        #cargo-buffer .cargo-item { position: relative !important; transform: none !important; top: auto !important; left: auto !important; }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>倉庫控制台</h2>
        
        <div class="control-group">
            <h3>1. 視角與模式</h3>
            <label>網格比例尺 (目前格寬: <span id="scale-val">40</span>px)</label>
            <input type="range" id="grid-scale" min="20" max="80" value="40" oninput="changeScale(this.value)">
            
            <div class="switch-container">
                <label for="snap-toggle">自動吸附對齊網格</label>
                <input type="checkbox" id="snap-toggle" checked onchange="toggleSnap(this.checked)">
            </div>
        </div>

        <div class="control-group">
            <h3>2. 倉庫專案管理</h3>
            <label>選擇倉庫</label>
            <select id="warehouse-select" onchange="switchWarehouse()">
                <option value="wh1">倉庫一 (30x30)</option>
            </select>
            <input type="text" id="wh-name" value="倉庫一">
            <div style="display:flex; gap:5px;">
                <input type="number" id="wh-w" value="30" placeholder="寬">
                <input type="number" id="wh-h" value="30" placeholder="高">
            </div>
            <button onclick="saveWarehouseSettings()">儲存/新建倉庫</button>
        </div>

        <div class="control-group">
            <h3>3. 生成新貨物</h3>
            <label>貨物名稱</label>
            <input type="text" id="cargo-name" value="棧板A">
            <div style="display:flex; gap:5px;">
                <input type="number" id="cargo-w" step="0.1" value="2" placeholder="寬(m)">
                <input type="number" id="cargo-h" step="0.1" value="2" placeholder="高(m)">
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <div>
                    <label>方塊顏色</label>
                    <input type="color" id="cargo-color" value="#ffc107" onchange="updateColorHistory(this.value)">
                </div>
                <div>
                    <label>文字顏色</label>
                    <input type="color" id="text-color" value="#000000">
                </div>
            </div>
            <label>最近使用顏色</label>
            <div class="color-history" id="color-history-container"></div>
            <button onclick="createNewCargo()" style="background-color: #28a745;">生成貨物</button>
        </div>
    </div>

    <div id="main-area">
        <h3>當前倉庫網格 (1格 = 1m²)</h3>
        <div id="warehouse-container">
            <div id="warehouse-grid"></div>
        </div>

        <h3>貨物待放置區 (請從此處拖拉至上方網格)</h3>
        <div id="cargo-buffer"></div>
    </div>

    <script>
        let warehouses = { 'wh1': { name: '倉庫一', width: 30, height: 30 } };
        let currentWhId = 'wh1';
        let colorHistory = ['#ffc107', '#28a745', '#007bff', '#dc3545'];
        
        let cellSize = 40; 
        let isSnapEnabled = true;

        window.onload = function() {
            renderGrid();
            renderColorHistory();
        };

        // 調整比例尺
        function changeScale(val) {
            cellSize = parseInt(val);
            document.getElementById('scale-val').textContent = cellSize;
            document.documentElement.style.setProperty('--cell-size',
