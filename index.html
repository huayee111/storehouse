<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司內部倉儲網格系統</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --grid-cols: 30;
            --grid-rows: 30;
            --cell-size: 40px; /* 一個格子代表 1 平方公尺 = 40像素 */
        }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
            display: flex;
            gap: 20px;
        }
        /* 左側控制面板 */
        #control-panel {
            width: 320px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .control-group {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        
        /* 最近使用顏色 */
        .color-history {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-top: 5px;
        }
        .color-dot {
            width: 25px;
            height: 25px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #ccc;
        }

        /* 右側畫布區 */
        #main-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        /* 倉庫網格容器 */
        #warehouse-container {
            border: 2px solid #333;
            background-color: #e2e8f0;
            overflow: auto; /* 讓大網格在手機/電腦上可以滾動 */
            position: relative;
            width: 100%;
            height: 600px;
        }
        #warehouse-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), var(--cell-size));
            grid-template-rows: repeat(var(--grid-rows), var(--cell-size));
            background-image: 
                linear-gradient(to right, #ccc 1px, transparent 1px),
                linear-gradient(to bottom, #ccc 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
            position: absolute;
            top: 0; left: 0;
        }
        
        /* 緩衝區（生成貨物的地方） */
        #cargo-buffer {
            min-height: 120px;
            background: #fff;
            border: 2px dashed #999;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 貨物樣式 */
        .cargo-item {
            background-color: #ffc107;
            border: 2px solid rgba(0,0,0,0.15);
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            cursor: move;
            touch-action: none; /* 防止手機瀏覽器預設拖動行為 */
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            user-select: none;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>倉庫控制台</h2>
        
        <div class="control-group">
            <h3>1. 倉庫切換與設定</h3>
            <label>選擇倉庫</label>
            <select id="warehouse-select" onchange="switchWarehouse()">
                <option value="wh1">倉庫一 (30x30)</option>
            </select>
            <label>修改/新增名稱</label>
            <input type="text" id="wh-name" value="倉庫一">
            <div style="display:flex; gap:5px;">
                <input type="number" id="wh-w" value="30" placeholder="寬">
                <input type="number" id="wh-h" value="30" placeholder="高">
            </div>
            <button onclick="saveWarehouseSettings()">儲存/新建倉庫</button>
        </div>

        <div class="control-group">
            <h3>2. 生成新貨物</h3>
            <label>貨物名稱</label>
            <input type="text" id="cargo-name" value="棧板A">
            <div style="display:flex; gap:5px;">
                <input type="number" id="cargo-w" step="0.1" value="2" placeholder="寬(m)">
                <input type="number" id="cargo-h" step="0.1" value="2" placeholder="高(m)">
            </div>
            <label>自訂顏色</label>
            <input type="color" id="cargo-color" value="#ffc107" onchange="updateColorHistory(this.value)">
            <label>最近使用顏色 (最多10種)</label>
            <div class="color-history" id="color-history-container"></div>
            <button onclick="createNewCargo()" style="background-color: #28a745;">生成貨物</button>
        </div>
    </div>

    <div id="main-area">
        <h3>當前倉庫網格 (1格 = 1m²)</h3>
        <div id="warehouse-container">
            <div id="warehouse-grid">
                </div>
        </div>

        <h3>貨物待放置區 (請從此處拖拉至上方網格)</h3>
        <div id="cargo-buffer">
            </div>
    </div>

    <script>
        // 模擬前端資料庫 (之後改為對接 GAS)
        let warehouses = {
            'wh1': { name: '倉庫一', width: 30, height: 30 }
        };
        let currentWhId = 'wh1';
        let colorHistory = ['#ffc107', '#28a745', '#007bff', '#dc3545']; // 初始常用色

        const cellSize = 40; // 1公尺 = 40px

        // 初始化
        window.onload = function() {
            renderGrid();
            renderColorHistory();
        };

        // 渲染網格
        function renderGrid() {
            const wh = warehouses[currentWhId];
            const grid = document.getElementById('warehouse-grid');
            
            // 更新 CSS 變數
            document.documentElement.style.setProperty('--grid-cols', wh.width);
            document.documentElement.style.setProperty('--grid-rows', wh.height);
            
            // 設定網格容器實際寬高
            grid.style.width = (wh.width * cellSize) + 'px';
            grid.style.height = (wh.height * cellSize) + 'px';
        }

        // 儲存或新增倉庫
        function saveWarehouseSettings() {
            const name = document.getElementById('wh-name').value;
            const w = parseInt(document.getElementById('wh-w').value);
            const h = parseInt(document.getElementById('wh-h').value);
            
            // 這裡簡單以名稱轉成 ID 模擬新增
            const id = 'wh_' + Date.now();
            warehouses[id] = { name: name, width: w, height: h };
            
            // 更新下拉選單
            const select = document.getElementById('warehouse-select');
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `${name} (${w}x${h})`;
            select.appendChild(opt);
            
            select.value = id;
            currentWhId = id;
            renderGrid();
        }

        function switchWarehouse() {
            currentWhId = document.getElementById('warehouse-select').value;
            const wh = warehouses[currentWhId];
            document.getElementById('wh-name').value = wh.name;
            document.getElementById('wh-w').value = wh.width;
            document.getElementById('wh-h').value = wh.height;
            renderGrid();
        }

        // 色盤歷史紀錄邏輯
        function updateColorHistory(color) {
            if (!colorHistory.includes(color)) {
                colorHistory.unshift(color); // 加到最前面
                if (colorHistory.length > 10) colorHistory.pop(); // 超過10個就刪除最後一個
                renderColorHistory();
            }
        }

        function renderColorHistory() {
            const container = document.getElementById('color-history-container');
            container.innerHTML = '';
            colorHistory.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.backgroundColor = color;
                dot.onclick = () => {
                    document.getElementById('cargo-color').value = color;
                };
                container.appendChild(dot);
            });
        }

        // 生成貨物 (支援小數點尺寸)
        function createNewCargo() {
            const name = document.getElementById('cargo-name').value;
            const w = parseFloat(document.getElementById('cargo-w').value);
            const h = parseFloat(document.getElementById('cargo-h').value);
            const color = document.getElementById('cargo-color').value;

            const cargo = document.createElement('div');
            cargo.className = 'cargo-item';
            cargo.textContent = name;
            
            // 依據米數計算實際 px 大小 (例如 1.5米 * 40px = 60px)
            cargo.style.width = (w * cellSize) + 'px';
            cargo.style.height = (h * cellSize) + 'px';
            cargo.style.backgroundColor = color;
            
            // 設定初始座標資料
            cargo.setAttribute('data-x', 0);
            cargo.setAttribute('data-y', 0);

            document.getElementById('cargo-buffer').appendChild(cargo);
            
            // 初始化這個新元件的拖拉功能
            initDraggable(cargo);
        }

        // Interact.js 拖拉與「網格磁吸」核心邏輯
        function initDraggable(element) {
            interact(element).draggable({
                inertia: true,
                modifiers: [
                    // 限制貨物不能拖出大容器
                    interact.modifiers.restrictRect({
                        restriction: '#main-area',
                        endOnly: false
                    }),
                    // 關鍵功能：磁吸到 40px (1公尺) 的網格點上
                    interact.modifiers.snap({
                        targets: [
                            interact.snappers.grid({ x: cellSize, y: cellSize })
                        ],
                        range: Infinity,
                        relativePoints: [ { x: 0, y: 0 } ] // 以貨物的左上角為磁吸基準點
                    })
                ],
                autoScroll: true, // 拖到邊緣時自動滾動
                listeners: {
                    move(event) {
                        const target = event.target;
                        // 讀取目前的累計位移
                        const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                        // 運用 CSS translate 移動方塊
                        target.style.transform = `translate(${x}px, ${y}px)`;

                        // 存回屬性中
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    },
                    end(event) {
                        const target = event.target;
                        
                        // 計算目前落在網格的第幾格座標 (X, Y 軸米數)
                        // 這裡可以透過計算相對於 #warehouse-grid 的 offset 來取得精確儲位
                        const rect = target.getBoundingClientRect();
                        const gridRect = document.getElementById('warehouse-grid').getBoundingClientRect();
                        
                        const relativeX = rect.left - gridRect.left;
                        const relativeY = rect.top - gridRect.top;
                        
                        // 如果成功拖進倉庫範圍內
                        if (relativeX >= 0 && relativeY >= 0 && relativeX < gridRect.width && relativeY < gridRect.height) {
                            const gridX = Math.round(relativeX / cellSize);
                            const gridY = Math.round(relativeY / cellSize);
                            console.log(`內勤指引：貨物 [${target.textContent}] 已被放置於座標 (${gridX}m, ${gridY}m)`);
                            
                            // 【下一步預留】在這裡呼叫 GAS 將座標同步到 Google Sheets
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
