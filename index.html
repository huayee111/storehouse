<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司內部倉儲網格系統 - 雲端同步版</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root {
            --grid-cols: 30;
            --grid-rows: 30;
            --cell-size: 40px;
        }
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
            background-color: #f4f6f9; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        #main-area { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            width: fit-content; 
            max-width: 100%;
        }
        #warehouse-container { 
            border: 2px solid #333; 
            background-color: #e2e8f0; 
            overflow: auto; 
            position: relative; 
            width: fit-content; 
            max-width: 100%;
            height: 500px; 
            border-radius: 8px;
        }
        #warehouse-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), var(--cell-size));
            grid-template-rows: repeat(var(--grid-rows), var(--cell-size));
            background-image: 
                linear-gradient(to right, #ccc 1px, transparent 1px),
                linear-gradient(to bottom, #ccc 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
            position: absolute;
            top: 0; left: 0;
            min-width: 100px;
            min-height: 100px;
        }
        
        #cargo-buffer { 
            min-height: 80px; 
            background: #fff; 
            border: 2px dashed #999; 
            border-radius: 8px; 
            padding: 10px; 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            flex-wrap: wrap; 
            width: 100%;
            box-sizing: border-box;
        }

        #control-panel { 
            background: white; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 -4px 10px rgba(0,0,0,0.05); 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px;
        }
        .control-group { 
            padding: 10px;
            border-right: 1px solid #eee; 
        }
        .control-group:last-child { border-right: none; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        input, select, button { width: 100%; padding: 8px; margin-bottom: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        
        .switch-container { display: flex; align-items: center; justify-content: space-between; }
        .switch-container input { width: auto; margin: 0; }

        .color-history { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
        .color-combo-dot { 
            width: 35px; height: 35px; border-radius: 6px; cursor: pointer; border: 2px solid #ccc; 
            display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold;
            user-select: none;
        }

        .cargo-item {
            position: absolute;
            box-sizing: border-box;
            border: 2px solid rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border-radius: 4px;
            cursor: move;
            touch-action: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
            user-select: none;
            z-index: 10;
        }
        .cargo-qty { font-size: 10px; opacity: 0.85; margin-top: 2px; background: rgba(0,0,0,0.1); padding: 1px 4px; border-radius: 3px; }
        .cargo-item.is-dragging { opacity: 0.7; z-index: 100; }
        #cargo-buffer .cargo-item { position: relative !important; transform: none !important; top: auto !important; left: auto !important; }

        #context-menu {
            display: none; position: absolute; background: white; border: 1px solid #ccc;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2); z-index: 1000; border-radius: 4px; overflow: hidden;
        }
        #context-menu div { padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: bold; }
        #context-menu div:hover { background: #ffc107; color: black; }
        #context-menu .delete-opt { color: #dc3545; }
        #context-menu .delete-opt:hover { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <div id="main-area">
        <h3>當前倉庫網格平面圖 (1格 = 1m²) <span id="sync-status" style="font-size:12px; color:#6c757d; margin-left:10px;">⏳ 正在初始化網格...</span></h3>
        <div id="warehouse-container">
            <div id="warehouse-grid"></div>
        </div>

        <h3>貨物待放置區</h3>
        <div id="cargo-buffer"></div>
    </div>

    <div id="control-panel">
        <div class="control-group">
            <h3>⚙️ 視角與模式</h3>
            <label>網格比例尺 (目前格寬: <span id="scale-val">40</span>px)</label>
            <input type="range" id="grid-scale" min="20" max="80" value="40" oninput="changeScale(this.value)">
            
            <div class="switch-container">
                <label for="snap-toggle">自動吸附對齊網格</label>
                <input type="checkbox" id="snap-toggle" checked onchange="toggleSnap(this.checked)">
            </div>
            <button onclick="syncFromCloud()" style="background-color: #6c757d; margin-top: 10px;">🔄 手動刷新雲端資料</button>
        </div>

        <div class="control-group">
            <h3>🏢 倉庫專案管理</h3>
            <label>選擇倉庫</label>
            <select id="warehouse-select" onchange="switchWarehouse()">
                <option value="wh1">倉庫一 (30x30)</option>
            </select>
            <input type="text" id="wh-name" value="倉庫一">
            <div style="display:flex; gap:5px;">
                <input type="number" id="wh-w" value="30" placeholder="寬">
                <input type="number" id="wh-h" value="30" placeholder="高">
            </div>
            <button onclick="saveWarehouseSettings()">儲存/新建倉庫</button>
        </div>

        <div class="control-group" style="grid-column: span 2;">
            <h3>📦 生成新貨物 (棧板)</h3>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>貨物名稱</label>
                    <input type="text" id="cargo-name" value="棧板A">
                    <label>初始產品數量</label>
                    <input type="number" id="cargo-qty" value="10">
                </div>
                <div style="flex: 1;">
                    <label>尺寸 寬 x 高 (米，支援小數點)</label>
                    <div style="display:flex; gap:5px;">
                        <input type="number" id="cargo-w" step="0.1" value="2" placeholder="寬(m)">
                        <input type="number" id="cargo-h" step="0.1" value="2" placeholder="高(m)">
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                        <div>
                            <label>方塊背景</label>
                            <input type="color" id="cargo-color" value="#ffc107">
                        </div>
                        <div>
                            <label>文字字體</label>
                            <input type="color" id="text-color" value="#000000">
                        </div>
                    </div>
                </div>
            </div>
            <label>最近使用雙色配對 (點擊一鍵套用)</label>
            <div class="color-history" id="color-history-container"></div>
            <button onclick="triggerCreateCargo()" style="background-color: #28a745; margin-top: 5px;">生成貨物</button>
        </div>
    </div>

    <div id="context-menu">
        <div onclick="editSelectedQty()">✏️ 修改數量</div>
        <div class="delete-opt" onclick="deleteSelectedCargo()">❌ 刪除貨物</div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx-sEY_rLOfnDHPl9YMBzIC3TBUUYuwQUeCP0rQABU_x2bYfOqW_7gS8vB2eY5Mm2hN/exec";

        let warehouses = { 'wh1': { name: '倉庫一', width: 30, height: 30 } };
        let currentWhId = 'wh1';
        let colorHistory = [
            {bg: '#ffc107', text: '#000000'},
            {bg: '#28a745', text: '#ffffff'},
            {bg: '#007bff', text: '#ffffff'},
            {bg: '#dc3545', text: '#ffffff'}
        ];
        
        let cellSize = 40; 
        let isSnapEnabled = true;
        let interactInstance = null;
        let rightClickedElement = null;

        window.onload = function() {
            // 安全機制：不論雲端成不成功，網頁一開都要先把預設網格畫出來！
            renderGrid();
            renderColorHistory();
            initInteractEngine();
            
            // 再去讀取雲端
            syncFromCloud(); 

            document.addEventListener('click', () => {
                document.getElementById('context-menu').style.display = 'none';
            });
        };

        function changeScale(val) {
            cellSize = parseInt(val);
            document.getElementById('scale-val').textContent = cellSize;
            document.documentElement.style.setProperty('--cell-size', cellSize + 'px');
            renderGrid();
            
            document.querySelectorAll('#warehouse-grid .cargo-item').forEach(item => {
                const w_m = parseFloat(item.getAttribute('data-w-m'));
                const h_m = parseFloat(item.getAttribute('data-h-m'));
                const m_x = parseFloat(item.getAttribute('data-m-x'));
                const m_y = parseFloat(item.getAttribute('data-m-y'));

                item.style.width = (w_m * cellSize) + 'px';
                item.style.height = (h_m * cellSize) + 'px';

                const pixelX = m_x * cellSize;
                const pixelY = m_y * cellSize;
                item.style.transform = `translate(${pixelX}px, ${pixelY}px)`;
                item.setAttribute('data-x', pixelX);
                item.setAttribute('data-y', pixelY);
            });
            initInteractEngine();
        }

        function toggleSnap(checked) {
            isSnapEnabled = checked;
            initInteractEngine();
        }

        function renderGrid() {
            const wh = warehouses[currentWhId] || { name: '倉庫一', width: 30, height: 30 };
            const grid = document.getElementById('warehouse-grid');
            document.documentElement.style.setProperty('--grid-cols', wh.width);
            document.documentElement.style.setProperty('--grid-rows', wh.height);
            grid.style.width = (wh.width * cellSize) + 'px';
            grid.style.height = (wh.height * cellSize) + 'px';
        }

        function syncFromCloud() {
            document.getElementById('sync-status').textContent = "⏳ 正在同步雲端資料...";
            document.getElementById('sync-status').style.color = "#6c757d";

            // 設定超時中斷，防止雲端卡死導致前台畫面出不來
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);

            fetch(GAS_URL, { signal: controller.signal })
            .then(res => res.json())
            .then(data => {
                clearTimeout(timeoutId);
                
                if(data && data.warehouses && Object.keys(data.warehouses).length > 0) {
                    warehouses = data.warehouses;
                }
                
                const select = document.getElementById('warehouse-select');
                select.innerHTML = '';
                for (let id in warehouses) {
                    const opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = `${warehouses[id].name} (${warehouses[id].width}x${warehouses[id].height})`;
                    select.appendChild(opt);
                }
                
                if (!warehouses[currentWhId]) {
                    currentWhId = Object.keys(warehouses)[0];
                }
                select.value = currentWhId;
                
                const wh = warehouses[currentWhId];
                document.getElementById('wh-name').value = wh.name;
                document.getElementById('wh-w').value = wh.width;
                document.getElementById('wh-h').value = wh.height;
                
                renderGrid();

                document.getElementById('warehouse-grid').innerHTML = '';
                document.getElementById('cargo-buffer').innerHTML = '';

                if(data && data.cargoItems) {
                    data.cargoItems.forEach(itemData => {
                        const cargo = reCreateCargoNode(itemData);
                        
                        if (itemData.warehouseId === currentWhId) {
                            const pixelX = parseFloat(itemData.m_x) * cellSize;
                            const pixelY = parseFloat(itemData.m_y) * cellSize;
                            cargo.style.transform = `translate(${pixelX}px, ${pixelY}px)`;
                            cargo.setAttribute('data-x', pixelX);
                            cargo.setAttribute('data-y', pixelY);
                            cargo.setAttribute('data-m-x', itemData.m_x);
                            cargo.setAttribute('data-m-y', itemData.m_y);
                            document.getElementById('warehouse-grid').appendChild(cargo);
                        } else if (itemData.warehouseId === 'buffer') {
                            document.getElementById('cargo-buffer').appendChild(cargo);
                        }
                    });
                }
                document.getElementById('sync-status').textContent = "✅ 雲端資料同步完成";
                document.getElementById('sync-status').style.color = "#28a745";
            })
            .catch(err => {
                clearTimeout(timeoutId);
                console.warn("雲端讀取未就緒，啟動本地防護模式:", err);
                document.getElementById('sync-status').textContent = "⚠️ 試算表格模式不相容，已切換至本地獨立運作模式";
                document.getElementById('sync-status').style.color = "#e67e22";
                renderGrid(); // 發生錯誤時依然確保網格正常渲染
            });
        }

        function autoSaveToCloud() {
            document.getElementById('sync-status').textContent = "⏳ 正在自動儲存至雲端...";
            document.getElementById('sync-status').style.color = "#6c757d";

            const cargoItems = [];
            
            document.querySelectorAll('#warehouse-grid .cargo-item').forEach(item => {
                cargoItems.push({
                    id: item.getAttribute('data-id'),
                    name: item.getAttribute('data-name'),
                    qty: item.getAttribute('data-qty'),
                    w_m: item.getAttribute('data-w-m'),
                    h_m: item.getAttribute('data-h-m'),
                    m_x: item.getAttribute('data-m-x') || "0",
                    m_y: item.getAttribute('data-m-y') || "0",
                    bg: item.style.backgroundColor,
                    text: item.style.color,
                    warehouseId: currentWhId
                });
            });

            document.querySelectorAll('#cargo-buffer .cargo-item').forEach(item => {
                cargoItems.push({
                    id: item.getAttribute('data-id'),
                    name: item.getAttribute('data-name'),
                    qty: item.getAttribute('data-qty'),
                    w_m: item.getAttribute('data-w-m'),
                    h_m: item.getAttribute('data-h-m'),
                    m_x: "0",
                    m_y: "0",
                    bg: item.style.backgroundColor,
                    text: item.style.color,
                    warehouseId: 'buffer'
                });
            });

            const payload = { warehouses: warehouses, cargoItems: cargoItems };

            fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            })
            .then(() => {
                document.getElementById('sync-status').textContent = "✅ 雲端儲存成功！";
                document.getElementById('sync-status').style.color = "#28a745";
            })
            .catch(err => {
                console.error("雲端儲存錯誤:", err);
                document.getElementById('sync-status').textContent = "❌ 雲端儲存失敗";
                document.getElementById('sync-status').style.color = "#dc3545";
            });
        }

        function saveWarehouseSettings() {
            const name = document.getElementById('wh-name').value;
            const w = parseInt(document.getElementById('wh-w').value);
            const h = parseInt(document.getElementById('wh-h').value);
            const id = 'wh_' + Date.now();
            warehouses[id] = { name: name, width: w, height: h };
            
            const select = document.getElementById('warehouse-select');
            const opt = document.createElement('option');
            opt.value = id; opt.textContent = `${name} (${w}x${h})`;
            select.appendChild(opt);
            select.value = id; currentWhId = id;
            renderGrid();
            autoSaveToCloud();
        }

        function switchWarehouse() {
            currentWhId = document.getElementById('warehouse-select').value;
            const wh = warehouses[currentWhId];
            if(wh) {
                document.getElementById('wh-name').value = wh.name;
                document.getElementById('wh-w').value = wh.width;
                document.getElementById('wh-h').value = wh.height;
                renderGrid();
            }
        }

        function triggerCreateCargo() {
            const bg = document.getElementById('cargo-color').value;
            const text = document.getElementById('text-color').value;
            const exists = colorHistory.some(c => c.bg === bg && c.text === text);
            if (!exists) {
                colorHistory.unshift({bg: bg, text: text});
                if (colorHistory.length > 10) colorHistory.pop();
                renderColorHistory();
            }
            createNewCargo();
            autoSaveToCloud();
        }

        function renderColorHistory() {
            const container = document.getElementById('color-history-container');
            container.innerHTML = '';
            colorHistory.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'color-combo-dot';
                dot.style.backgroundColor = color.bg;
                dot.style.color = color.text;
                dot.textContent = "Abc";
                dot.onclick = () => { 
                    document.getElementById('cargo-color').value = color.bg; 
                    document.getElementById('text-color').value = color.text; 
                };
                container.appendChild(dot);
            });
        }

        function createNewCargo() {
            const name = document.getElementById('cargo-name').value;
            const qty = document.getElementById('cargo-qty').value;
            const w = parseFloat(document.getElementById('cargo-w').value);
            const h = parseFloat(document.getElementById('cargo-h').value);
            const bgColor = document.getElementById('cargo-color').value;
            const textColor = document.getElementById('text-color').value;

            const itemData = { id: 'item_' + Date.now(), name: name, qty: qty, w_m: w, h_m: h, bg: bgColor, text: textColor };
            const cargo = reCreateCargoNode(itemData);
            document.getElementById('cargo-buffer').appendChild(cargo);
        }

        function reCreateCargoNode(itemData) {
            const cargo = document.createElement('div');
            cargo.className = 'cargo-item';
            cargo.innerHTML = `<span class="cargo-title">${itemData.name}</span><span class="cargo-qty">${itemData.qty} 件</span>`;
            
            cargo.style.width = (parseFloat(itemData.w_m) * cellSize) + 'px';
            cargo.style.height = (parseFloat(itemData.h_m) * cellSize) + 'px';
            cargo.style.backgroundColor = itemData.bg;
            cargo.style.color = itemData.text;
            
            cargo.setAttribute('data-w-m', itemData.w_m);
            cargo.setAttribute('data-h-m', itemData.h_m);
            cargo.setAttribute('data-qty', itemData.qty);
            cargo.setAttribute('data-name', itemData.name);
            cargo.setAttribute('data-id', itemData.id);

            cargo.addEventListener('click', (e) => {
                e.stopPropagation();
                if(cargo.parentElement.id === 'warehouse-grid') {
                    const newQty = prompt("請輸入新的貨物數量：", cargo.getAttribute('data-qty'));
                    if (newQty !== null) {
                        cargo.setAttribute('data-qty', newQty);
                        cargo.querySelector('.cargo-qty').textContent = `${newQty} 件`;
                        autoSaveToCloud();
                    }
                }
            });

            cargo.addEventListener('contextmenu', (e) => {
                e.preventDefault(); e.stopPropagation();
                rightClickedElement = cargo;
                const menu = document.getElementById('context-menu');
                menu.style.display = 'block'; menu.style.left = e.pageX + 'px'; menu.style.top = e.pageY + 'px';
            });

            return cargo;
        }

        function editSelectedQty() { if(rightClickedElement) rightClickedElement.click(); }
        function deleteSelectedCargo() { 
            if(rightClickedElement) { 
                rightClickedElement.remove(); 
                rightClickedElement = null; 
                autoSaveToCloud();
            } 
        }

        function initInteractEngine() {
            if (interactInstance) interactInstance.unset();

            let dragModifiers = [
                interact.modifiers.restrictRect({ restriction: '#main-area', endOnly: false })
            ];

            if (isSnapEnabled) {
                dragModifiers.push(
                    interact.modifiers.snap({
                        targets: [ interact.snappers.grid({ x: cellSize, y: cellSize }) ],
                        range: Infinity,
                        relativePoints: [ { x: 0, y: 0 } ]
                    })
                );
            }

            interactInstance = interact('.cargo-item').draggable({
                inertia: false,
                modifiers: dragModifiers,
                autoScroll: true,
                listeners: {
                    start(event) { event.target.classList.add('is-dragging'); },
                    move(event) {
                        const target = event.target;
                        if (target.parentElement.id === 'cargo-buffer') {
                            const bufferRect = target.getBoundingClientRect();
                            const gridRect = document.getElementById('warehouse-grid').getBoundingClientRect();
                            const initX = bufferRect.left - gridRect.left;
                            const initY = bufferRect.top - gridRect.top;
                            target.setAttribute('data-x', initX);
                            target.setAttribute('data-y', initY);
                            document.getElementById('warehouse-grid').appendChild(target);
                        }

                        let x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        let y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x);
                        target.setAttribute('data-y', y);
                    },
                    end(event) {
                        const target = event.target;
                        target.classList.remove('is-dragging');
                        
                        let x = parseFloat(target.getAttribute('data-x')) || 0;
                        let y = parseFloat(target.getAttribute('data-y')) || 0;
                        const w = parseFloat(target.offsetWidth);
                        const h = parseFloat(target.offsetHeight);

                        const otherItems = document.querySelectorAll('#warehouse-grid .cargo-item');
                        
                        for (let other of otherItems) {
                            if (other === target) continue;

                            const oX = parseFloat(other.getAttribute('data-x')) || 0;
                            const oY = parseFloat(other.getAttribute('data-y')) || 0;
                            const oW = parseFloat(other.offsetWidth);
                            const oH = parseFloat(other.offsetHeight);

                            if (x < oX + oW - 0.5 && x + w - 0.5 > oX && y < oY + oH - 0.5 && y + h - 0.5 > oY) {
                                const pushLeft = (oX - w);
                                const pushRight = (oX + oW);
                                const pushTop = (oY - h);
                                const pushBottom = (oY + oH);

                                const dists = [
                                    { x: pushLeft, y: y, d: Math.abs(x - pushLeft) },
                                    { x: pushRight, y: y, d: Math.abs(x - pushRight) },
                                    { x: x, y: pushTop, d: Math.abs(y - pushTop) },
                                    { x: x, y: pushBottom, d: Math.abs(y - pushBottom) }
                                ];
                                
                                dists.sort((a, b) => a.d - b.d);
                                let bestFit = dists[0];

                                if (isSnapEnabled) {
                                    bestFit.x = Math.round(bestFit.x / cellSize) * cellSize;
                                    bestFit.y = Math.round(bestFit.y / cellSize) * cellSize;
                                }

                                x = bestFit.x;
                                y = bestFit.y;
                                
                                target.style.transform = `translate(${x}px, ${y}px)`;
                                target.setAttribute('data-x', x);
                                target.setAttribute('data-y', y);
                            }
                        }

                        const metricX = Math.round((x / cellSize) * 10) / 10;
                        const metricY = Math.round((y / cellSize) * 10) / 10;
                        target.setAttribute('data-m-x', metricX);
                        target.setAttribute('data-m-y', metricY);

                        autoSaveToCloud();
                    }
                }
            });
        }
    </script>
