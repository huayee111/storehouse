<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公司內部倉儲網格系統 - 終極穩定版</title>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --grid-cols: 30; --grid-rows: 30; --cell-size: 20px; }
        body { font-family: sans-serif; margin: 15px; background-color: #f4f6f9; display: flex; flex-direction: column; gap: 15px; user-select: none; }
        #main-area { width: 100%; max-width: 900px; }
        .wh-title-highlight { color: #1a365d; background-color: #e2e8f0; padding: 2px 8px; border-radius: 6px; }
        .canvas-layout { display: flex; gap: 15px; }
        #warehouse-container { border: 2px solid #333; background: #fff; position: relative; width: fit-content; border-radius: 8px; }
        #cargo-buffer { min-height: 110px; background: #fff; border: 2px dashed #a0aec0; padding: 12px; display: flex; gap: 10px; flex-wrap: wrap; }
        .cargo-item { position: absolute; box-sizing: border-box; border: 2px solid rgba(0,0,0,0.25); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; cursor: move; touch-action: none; padding: 4px; overflow: hidden; pointer-events: auto !important; }
        .cargo-item.is-locked { opacity: 0.5; border: 2px dashed #000; cursor: not-allowed; }
        .cargo-star-badge { position: absolute; top: 0; left: 2px; color: #ffc107; font-weight: bold; }
        .custom-modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 99999; align-items: center; justify-content: center; }
        .custom-modal-window { background: white; padding: 20px; border-radius: 10px; width: 300px; }
        .custom-modal-input { width: 100%; height: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="main-area">
        <h3><span class="wh-title-highlight" id="title-wh-name">倉庫一</span>網格平面圖 <span id="sync-status">⏳ 載入中...</span></h3>
        <div id="warehouse-tabs-bar"></div>
        <div class="canvas-layout">
            <div id="warehouse-container"><div id="warehouse-grid"><div id="cargo-layer"></div></div></div>
        </div>
        <h3>貨物待放置區</h3>
        <div id="cargo-buffer"></div>
    </div>

    <div id="control-panel" style="width:100%; max-width:900px; padding:20px; background:#fff;">
        <label>商品名稱</label><input type="text" id="cargo-name" value="棧板A">
        <label>數量</label><input type="number" id="cargo-qty" value="0">
        <button class="action-btn" onclick="triggerCreateCargo()">➕ 生成貨物</button>
        <div id="color-history-container" style="display:flex; gap:10px; margin-top:10px;"></div>
    </div>

    <div class="custom-modal-backdrop" id="custom-edit-modal">
        <div class="custom-modal-window">
            <h4 id="modal-panel-title">編輯資訊</h4>
            <div id="modal-inputs-area"></div>
            <button onclick="closeCustomModal()">取消</button>
            <button onclick="submitCustomModal()">儲存</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbx-sEY_rLOfnDHPl9YMBzIC3TBUUYuwQUeCP0rQABU_x2bYfOqW_7gS8vB2eY5Mm2hN/exec";
        let globalCargoCache = [], warehouses = { 'wh1': { name: '倉庫一', width: 30, height: 30 } }, currentWhId = 'wh1', rightClickedElement = null, modalActiveType = "";

        window.onload = () => { syncFromCloud(); renderColorHistory(); };

        function syncFromCloud() {
            fetch(GAS_URL).then(res => res.json()).then(data => {
                warehouses = data["倉庫設定"] || warehouses;
                globalCargoCache = data["貨物資料"] || [];
                renderCurrentWarehouseCargoes();
            }).catch(() => { document.getElementById('sync-status').textContent = "⚠️ 單機模式"; });
        }

        function autoSaveToCloud() {
            const payload = { "倉庫設定": warehouses, "貨物資料": globalCargoCache };
            fetch(GAS_URL, { method: "POST", mode: "no-cors", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload) });
            document.getElementById('sync-status').textContent = "✅ 已儲存";
        }

        function triggerCreateCargo() {
            const bg = "#ffc107", text = "#000000";
            const itemData = { 
                id: 'item_' + Date.now(), name: document.getElementById('cargo-name').value, 
                qty: parseInt(document.getElementById('cargo-qty').value) || 0, w_m: 2, h_m: 2, 
                m_x: 0, m_y: 0, bg: bg, text: text, warehouseId: `buffer_${currentWhId}`, 
                z_level: 1, isLocked: false, isStarred: false, memo: '' 
            };
            globalCargoCache.push(itemData);
            autoSaveToCloud();
            renderCurrentWarehouseCargoes();
        }

        function renderCurrentWarehouseCargoes() {
            const layer = document.getElementById('cargo-layer'); layer.innerHTML = '';
            const buffer = document.getElementById('cargo-buffer'); buffer.innerHTML = '';
            globalCargoCache.forEach(d => {
                const node = reCreateCargoNode(d);
                if (d.warehouseId === currentWhId) layer.appendChild(node);
                else if (d.warehouseId === `buffer_${currentWhId}`) buffer.appendChild(node);
            });
            initInteractEngine();
        }

        function reCreateCargoNode(d) {
            const el = document.createElement('div'); el.className = 'cargo-item'; el.setAttribute('data-id', d.id);
            el.innerHTML = `<span>${d.name}</span>`;
            el.style.width = (d.w_m * 20) + 'px'; el.style.height = (d.h_m * 20) + 'px';
            el.style.background = d.bg; el.style.color = d.text;
            el.addEventListener('dblclick', () => { rightClickedElement = el; modalActiveType = "qty"; openCustomModal("修改數量", `<input type="number" id="m-val" value="${d.qty}">`); });
            return el;
        }

        function openCustomModal(t, h) { document.getElementById('modal-panel-title').innerText = t; document.getElementById('modal-inputs-area').innerHTML = h; document.getElementById('custom-edit-modal').style.display = 'flex'; }
        function closeCustomModal() { document.getElementById('custom-edit-modal').style.display = 'none'; }
        function submitCustomModal() {
            const id = rightClickedElement.getAttribute('data-id');
            const item = globalCargoCache.find(i => i.id === id);
            if(modalActiveType === "qty") item.qty = document.getElementById('m-val').value;
            autoSaveToCloud(); renderCurrentWarehouseCargoes(); closeCustomModal();
        }

        function initInteractEngine() {
            interact('.cargo-item').draggable({
                listeners: {
                    move(event) {
                        const target = event.target;
                        let x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                        let y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                        target.style.transform = `translate(${x}px, ${y}px)`;
                        target.setAttribute('data-x', x); target.setAttribute('data-y', y);
                    },
                    end(event) {
                        const id = event.target.getAttribute('data-id');
                        const item = globalCargoCache.find(i => i.id === id);
                        item.m_x = Math.round((parseFloat(event.target.getAttribute('data-x'))/20)*10)/10;
                        item.m_y = Math.round((parseFloat(event.target.getAttribute('data-y'))/20)*10)/10;
                        autoSaveToCloud();
                    }
                }
            });
        }
    </script>
</body>
</html>
